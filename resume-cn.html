        <h2 class="section-title fade-in">AI 相关经验</h2>
        <div class="ai-grid">
          ${DATA.ai.map(a => `
            <div class="ai-card fade-in">
              <div class="ai-icon">${a.icon}</div>
              <div class="ai-title">${a.title}</div>
              <div class="ai-context">${a.context}</div>
              <div class="ai-desc">${a.desc}</div>
            </div>`).join('')}
        </div>
      </div>
    </section>

    <section id="education">
      <div class="container">
        <div class="section-label fade-in">学术背景</div>
        <h2 class="section-title fade-in">教育背景</h2>
        <div class="edu-grid">
          ${DATA.education.map(e => `
            <div class="edu-card fade-in">
              <div class="edu-badge">${e.dates}</div>
              <div class="edu-degree">${e.degree}</div>
              <div class="edu-school">${e.school}</div>
            </div>`).join('')}
        </div>
      </div>
    </section>

    <section id="certifications">
      <div class="container">
        <div class="section-label fade-in">专业资质</div>
        <h2 class="section-title fade-in">专业认证</h2>
        <div class="cert-grid">
          ${DATA.certifications.map(c => `
            <div class="cert-card fade-in">
              <span class="cert-icon">◆</span>${c}
            </div>`).join('')}
        </div>
      </div>
    </section>

    <footer>
      ${DATA.name} &nbsp;·&nbsp; ${DATA.email} &nbsp;·&nbsp; ${DATA.phone}
    </footer>
  `;

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
}

render();
</script>

</body>
</html>
